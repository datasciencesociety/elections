name: Deploy Protocols Stack

on:
  push:
    branches: [protocols]
    paths:
      - ".github/workflows/deploy-protocols-backend.yml"
      - "protocols/docker-compose.yml"
      - "protocols/frontend/**"
      - "protocols/backend/election-protocols-be/**"
      - "protocols/backend/pyproject.toml"
      - "protocols/backend/uv.lock"
  workflow_dispatch:

env:
  DEPLOY_DIR: ~/elections/protocols
  STACK_DIR: ~/elections/protocols
  BACKEND_PORT: 4010
  FRONTEND_PORT: 4011

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROTOCOLS_VM_HOST }}
          username: ${{ secrets.PROTOCOLS_VM_USERNAME }}
          password: ${{ secrets.PROTOCOLS_VM_PASSWORD }}
          port: ${{ secrets.PROTOCOLS_VM_PORT }}
          source: "protocols/docker-compose.yml,protocols/frontend/,protocols/backend/pyproject.toml,protocols/backend/uv.lock,protocols/backend/election-protocols-be/"
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true
          rm: true
          strip_components: 1

      - name: Build and deploy stack
        uses: appleboy/ssh-action@v1
        env:
          ENVIRONMENT: ${{ secrets.PROTOCOLS_APP_ENVIRONMENT || 'production' }}
          LOGGING_LEVEL: ${{ secrets.PROTOCOLS_APP_LOGGING_LEVEL || 'INFO' }}
          BACKEND_PORT: ${{ vars.PROTOCOLS_BACKEND_PORT || env.BACKEND_PORT }}
          FRONTEND_PORT: ${{ vars.PROTOCOLS_FRONTEND_PORT || env.FRONTEND_PORT }}
        with:
          host: ${{ secrets.PROTOCOLS_VM_HOST }}
          username: ${{ secrets.PROTOCOLS_VM_USERNAME }}
          password: ${{ secrets.PROTOCOLS_VM_PASSWORD }}
          port: ${{ secrets.PROTOCOLS_VM_PORT }}
          envs: ENVIRONMENT,LOGGING_LEVEL,BACKEND_PORT,FRONTEND_PORT
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:$PATH"

            if docker compose version >/dev/null 2>&1; then
              compose() { docker compose "$@"; }
            else
              compose() { docker-compose "$@"; }
            fi

            mkdir -p ${{ env.STACK_DIR }}
            cd ${{ env.STACK_DIR }}

            echo "Deploying frontend and backend with Docker Compose..."
            export ENVIRONMENT LOGGING_LEVEL BACKEND_PORT FRONTEND_PORT
            compose up --build -d --remove-orphans

            echo "Cleaning up dangling images..."
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_PORT: ${{ vars.PROTOCOLS_BACKEND_PORT || env.BACKEND_PORT }}
          FRONTEND_PORT: ${{ vars.PROTOCOLS_FRONTEND_PORT || env.FRONTEND_PORT }}
        with:
          host: ${{ secrets.PROTOCOLS_VM_HOST }}
          username: ${{ secrets.PROTOCOLS_VM_USERNAME }}
          password: ${{ secrets.PROTOCOLS_VM_PASSWORD }}
          port: ${{ secrets.PROTOCOLS_VM_PORT }}
          envs: BACKEND_PORT,FRONTEND_PORT
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:$PATH"

            if docker compose version >/dev/null 2>&1; then
              compose() { docker compose "$@"; }
            else
              compose() { docker-compose "$@"; }
            fi

            echo "Waiting for container to start..."
            sleep 10

            cd ${{ env.STACK_DIR }}

            if ! docker ps --format '{{.Names}}' | grep -q '^election-protocols-backend$'; then
              echo "Backend container is not running!"
              compose logs backend || true
              exit 1
            fi

            if ! docker ps --format '{{.Names}}' | grep -q '^election-protocols-frontend$'; then
              echo "Frontend container is not running!"
              compose logs frontend || true
              exit 1
            fi

            BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${BACKEND_PORT}/health 2>/dev/null || echo "000")
            FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${FRONTEND_PORT}/ 2>/dev/null || echo "000")

            if [ "$BACKEND_STATUS" = "200" ] && [ "$FRONTEND_STATUS" = "200" ]; then
              echo "Health check passed (frontend HTTP $FRONTEND_STATUS, backend HTTP $BACKEND_STATUS)"
            else
              echo "Health check failed (frontend HTTP $FRONTEND_STATUS, backend HTTP $BACKEND_STATUS)"
              compose logs --tail 50 || true
              exit 1
            fi
