name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: elections
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/elections
            git pull origin main
            pnpm install --frozen-lockfile
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} pnpm --filter web build
            rm -rf /opt/elections/og-cache/*
            # Nginx cache dir is www-data-owned; use the exact path our
            # NOPASSWD sudoers rule allows (see /etc/sudoers.d/elections).
            sudo rm -rf /var/cache/nginx/elections/*
            sudo systemctl restart elections-api
            # Restart discovery only if the unit exists (installed once via
            # discovery/scripts/bootstrap.sh). Safe no-op on fresh clones.
            if systemctl list-unit-files | grep -q '^elections-video\.service'; then
              sudo systemctl restart elections-video
            fi
