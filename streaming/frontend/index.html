<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stream Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      border-bottom: 1px solid #2a2d3a;
      padding-bottom: 16px;
    }

    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: .03em; }

    #last-updated {
      font-size: .75rem;
      color: #666;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1a1d27;
      border-radius: 10px;
      padding: 16px 18px;
      border-left: 4px solid #444;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }

    .card.NORMAL  { border-left-color: #22c55e; }
    .card.FROZEN  { border-left-color: #3b82f6; }
    .card.MOTION  { border-left-color: #f97316; }
    .card.UNKNOWN { border-left-color: #6b7280; }

    .card:hover { box-shadow: 0 0 0 1px #ffffff18; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .cam-id {
      font-size: .95rem;
      font-weight: 600;
      word-break: break-all;
    }

    .badge {
      font-size: .7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
      margin-left: 8px;
    }

    .badge.NORMAL  { background: #166534; color: #86efac; }
    .badge.FROZEN  { background: #1e3a5f; color: #93c5fd; }
    .badge.MOTION  { background: #7c2d12; color: #fdba74; }
    .badge.UNKNOWN { background: #374151; color: #9ca3af; }

    .metrics { display: flex; flex-direction: column; gap: 6px; }

    .metric {
      display: flex;
      justify-content: space-between;
      font-size: .78rem;
    }

    .metric-label { color: #8b8fa8; }
    .metric-value { font-variant-numeric: tabular-nums; color: #d1d5db; }

    .bar-row { margin-top: 4px; }
    .bar-track {
      height: 3px;
      background: #2a2d3a;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 3px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s ease;
    }

    .bar-fill.NORMAL { background: #22c55e; }
    .bar-fill.FROZEN { background: #3b82f6; }
    .bar-fill.MOTION { background: #f97316; }
    .bar-fill.UNKNOWN{ background: #6b7280; }

    .timestamp {
      font-size: .68rem;
      color: #4b5563;
      margin-top: 10px;
      text-align: right;
    }

    #empty {
      grid-column: 1/-1;
      text-align: center;
      color: #4b5563;
      padding: 60px 0;
      font-size: 1rem;
    }

    .card-body {
      display: flex;
      gap: 14px;
    }

    .card-video {
      flex: 0 0 200px;
    }

    .card-video video {
      width: 200px;
      height: 112px;
      object-fit: cover;
      border-radius: 6px;
      background: #000;
      display: block;
    }

    .card-metrics {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>
<body>

<header>
  <h1>📷 Stream Monitor</h1>
  <span id="last-updated">Waiting for data…</span>
</header>

<div id="grid"><div id="empty">Connecting to feed…</div></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
  const FEED_URL = '/feed.xml';
  const REFRESH_MS = 1000;
  const HLS_BASE = `http://${location.hostname}:8888`;
  const hlsInstances = {};  // stream_id -> Hls instance

  // latest result per camera
  const cameras = {};

  function fmt(val, decimals = 6) {
    if (val == null) return '—';
    const n = parseFloat(val);
    return isNaN(n) ? '—' : n.toExponential(2);
  }

  function clamp01(v) { return Math.max(0, Math.min(1, v)); }

  function parseDescription(html) {
    // description is a CDATA JSON block inside <pre>
    const match = html.match(/<pre>([\s\S]*?)<\/pre>/);
    if (!match) return {};
    try { return JSON.parse(match[1]); } catch { return {}; }
  }

  async function fetchFeed() {
    try {
      const res = await fetch(FEED_URL + '?t=' + Date.now());
      const text = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'application/xml');
      const items = doc.querySelectorAll('item');

      items.forEach(item => {
        const titleEl = item.querySelector('title');
        if (!titleEl) return;
        const titleText = titleEl.textContent.trim();       // "234602001 — FROZEN"
        const parts = titleText.split(' — ');
        if (parts.length < 2) return;
        const id = parts[0].trim();
        const status = parts[1].trim();
        const pubDate = item.querySelector('pubDate')?.textContent || '';
        const descEl = item.querySelector('description');
        const metrics = descEl ? parseDescription(descEl.textContent) : {};
        // Keep only the freshest entry per camera
        if (!cameras[id] || new Date(pubDate) >= new Date(cameras[id].pubDate)) {
          cameras[id] = { id, status, pubDate, metrics };
        }
      });

      renderGrid();
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById('last-updated').textContent = 'Feed error: ' + e.message;
    }
  }

  function attachHls(id) {
    const videoEl = document.getElementById(`video-${id}`);
    if (!videoEl || hlsInstances[id]) return;
    const src = `${HLS_BASE}/${id}/index.m3u8`;
    if (Hls.isSupported()) {
      const hls = new Hls({ liveSyncDurationCount: 1, maxBufferLength: 4 });
      hls.loadSource(src);
      hls.attachMedia(videoEl);
      hlsInstances[id] = hls;
    } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
      videoEl.src = src;
      hlsInstances[id] = true;
    }
  }

  function createCard(cam) {
    const card = document.createElement('div');
    card.id = `card-${cam.id}`;
    card.className = 'card UNKNOWN';
    card.innerHTML = `
      <div class="card-header">
        <span class="cam-id">${cam.id}</span>
        <span class="badge UNKNOWN" data-badge></span>
      </div>
      <div class="card-body">
        <div class="card-video">
          <video id="video-${cam.id}" autoplay muted playsinline></video>
        </div>
        <div class="card-metrics">
          <div class="metrics">
            <div class="metric">
              <span class="metric-label">Pixel MSE</span>
              <span class="metric-value" data-mse-val></span>
            </div>
            <div class="bar-row"><div class="bar-track"><div class="bar-fill UNKNOWN" data-mse-bar></div></div></div>
            <div class="metric">
              <span class="metric-label">Histogram L1</span>
              <span class="metric-value" data-hist-val></span>
            </div>
            <div class="bar-row"><div class="bar-track"><div class="bar-fill UNKNOWN" data-hist-bar></div></div></div>
            <div class="metric">
              <span class="metric-label">dHash</span>
              <span class="metric-value" data-dhash-val></span>
            </div>
            <div class="bar-row"><div class="bar-track"><div class="bar-fill UNKNOWN" data-dhash-bar></div></div></div>
            <div class="metric">
              <span class="metric-label">Darkness</span>
              <span class="metric-value" data-dark-val></span>
            </div>
            <div class="metric" data-ssim-row style="display:none">
              <span class="metric-label">SSIM</span>
              <span class="metric-value" data-ssim-val></span>
            </div>
          </div>
          <div class="timestamp" data-ts></div>
        </div>
      </div>
    `;
    return card;
  }

  function updateCard(card, cam) {
    const m = cam.metrics;
    const status = cam.status || 'UNKNOWN';
    const mse   = parseFloat(m.pixel_mse_s10)      || 0;
    const hist  = parseFloat(m.histogram_l1_s10)   || 0;
    const dark  = parseFloat(m.darkness_mean)      || 0;
    const dhash = parseFloat(m.dhash_hamming_mean) || 0;
    const ssim  = m.ssim != null ? parseFloat(m.ssim) : null;

    card.className = `card ${status}`;
    const badge = card.querySelector('[data-badge]');
    badge.className = `badge ${status}`;
    badge.textContent = status;

    card.querySelector('[data-mse-val]').textContent  = fmt(mse);
    card.querySelector('[data-hist-val]').textContent = fmt(hist);
    card.querySelector('[data-dhash-val]').textContent = fmt(dhash, 4);
    card.querySelector('[data-dark-val]').textContent = dark.toFixed(3);

    card.querySelector('[data-mse-bar]').style.width  = `${clamp01(mse / 0.02) * 100}%`;
    card.querySelector('[data-hist-bar]').style.width = `${clamp01(hist / 0.001) * 100}%`;
    card.querySelector('[data-dhash-bar]').style.width = `${clamp01(dhash / 0.35) * 100}%`;

    [card.querySelector('[data-mse-bar]'),
     card.querySelector('[data-hist-bar]'),
     card.querySelector('[data-dhash-bar]')].forEach(el => {
      el.className = `bar-fill ${status}`;
    });

    const ssimRow = card.querySelector('[data-ssim-row]');
    if (ssim != null) {
      ssimRow.style.display = '';
      card.querySelector('[data-ssim-val]').textContent = ssim.toFixed(4);
    } else {
      ssimRow.style.display = 'none';
    }

    card.querySelector('[data-ts]').textContent = new Date(cam.pubDate).toLocaleTimeString();
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const entries = Object.values(cameras).sort((a, b) => a.id.localeCompare(b.id));
    if (entries.length === 0) return;

    // Remove the placeholder if present
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    entries.forEach(cam => {
      let card = document.getElementById(`card-${cam.id}`);
      if (!card) {
        card = createCard(cam);
        grid.appendChild(card);
        attachHls(cam.id);
      }
      updateCard(card, cam);
    });
  }

  fetchFeed();
  setInterval(fetchFeed, REFRESH_MS);
</script>
</body>
</html>
