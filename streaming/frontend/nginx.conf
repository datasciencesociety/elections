server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so the upstream is re-resolved after restarts
    resolver 127.0.0.11 valid=5s;

    # Proxy RSS feed to avoid CORS
    location /feed.xml {
        set $upstream http://analyzer:8080;
        proxy_pass $upstream/feed.xml;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }
}
