# Drop-in snippet — include inside the existing `server { server_name
# map.izborenmonitor.com karta.izborenmonitor.com; ... }` block in
# /etc/nginx/sites-enabled/elections (bootstrap.sh wires this up).
#
# Two cache layers stack with Cloudflare's edge cache:
#   CF edge (2s via Cache-Control) → nginx proxy_cache (2s) → hono blob (1s).
# Origin hono sees <1 req/s regardless of client volume.

# Hot read path: the full metrics blob.
location = /video/metrics {
    proxy_pass http://127.0.0.1:3001/metrics;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_cache elections;
    proxy_cache_valid 200 2s;
    proxy_cache_use_stale error timeout updating;
    proxy_cache_lock on;
    proxy_cache_background_update on;
    add_header X-Cache-Status $upstream_cache_status;
}

# Everything else on /video/* — register, heartbeat, metrics POST, assignments/my, etc.
# No caching (stateful, authenticated, or analyzer-specific).
location /video/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    # Small POST bodies (metrics batches). Boxes send ~30 sections per batch.
    client_max_body_size 1m;
    proxy_read_timeout 30s;
}
