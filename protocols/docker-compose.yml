services:
  backend:
    build:
      context: .
      dockerfile: backend/election-protocols-be/Dockerfile
    container_name: election-protocols-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-INFO}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4010}:4010"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: election-protocols-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4011}:80"

  qwen:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-latest}
    container_name: election-protocols-qwen
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    ports:
      - "127.0.0.1:${QWEN_PORT:-4012}:4012"
    volumes:
      - ${QWEN_MODEL_PATH:-~/models/qwen35-7b}:/models/qwen35:ro
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command:
      - --model=/models/qwen35
      - --served-model-name=${QWEN_MODEL_NAME:-qwen3.5-7b}
      - --max-model-len=${QWEN_MAX_MODEL_LEN:-16384}
      - --gpu-memory-utilization=0.90
      - --enable-prefix-caching
      - --reasoning-parser=qwen3
      - --kv-cache-dtype=fp8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
