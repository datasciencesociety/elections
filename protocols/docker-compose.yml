services:
  backend:
    build:
      context: .
      dockerfile: backend/election-protocols-be/Dockerfile
    container_name: election-protocols-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-INFO}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "${BACKEND_PORT:-4010}:4010"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: election-protocols-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4011}:80"

