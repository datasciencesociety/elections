<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Проверка на избори</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #ffffff;
            padding: 60px 24px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            border: 1px solid #dddddd;
            border-radius: 16px;
            padding: 32px;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 24px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #cccccc;
            border-radius: 10px;
            font-size: 14px;
        }

        .field {
            margin-bottom: 24px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #111111;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Проверка на избори</h1>

        <div class="field">
            <label for="section">Номер на секция</label>
            <input type="text" id="section" placeholder="Например: 021" />
        </div>

        <div class="field">
            <label for="file">Качване на файл</label>
            <input type="file" id="file" accept=".pdf,.png,.jpg,.jpeg" />
        </div>

        <button type="button">Провери</button>
    </div>
</body>

</html>
