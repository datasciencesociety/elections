################################################################################
# /etc/nginx/nginx.conf  –  HLS streaming proxy
# Ubuntu 22.04 + nginx 1.18+
################################################################################

user  www-data;
worker_processes  auto;
worker_rlimit_nofile  131072;

error_log  /var/log/nginx/error.log  warn;
pid        /run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    ############################################################################
    # Logging
    ############################################################################
    log_format  hls_main  '$remote_addr - [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$upstream_addr" ${upstream_response_time}s '
                           'cache=$upstream_cache_status';

    access_log  /var/log/nginx/access.log  hls_main  buffer=64k  flush=5s;

    ############################################################################
    # Performance fundamentals
    ############################################################################
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   30;
    keepalive_requests  500;

    ############################################################################
    # Client limits
    ############################################################################
    client_max_body_size    1k;
    client_header_timeout   10s;
    client_body_timeout     10s;

    ############################################################################
    # Proxy shared settings
    ############################################################################
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $proxy_host;
    proxy_set_header        User-Agent        "Mozilla/5.0";
    proxy_set_header        Referer           "https://evideo.bg/";
    proxy_set_header        X-Real-IP         $remote_addr;

    proxy_connect_timeout   5s;
    proxy_send_timeout      15s;
    proxy_read_timeout      30s;

    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8  64k;
    proxy_busy_buffers_size 128k;

    ############################################################################
    # Shared cache zone  (1 GB on-disk, 50 MB key metadata in RAM)
    ############################################################################
    proxy_cache_path  /var/cache/nginx/hls
        levels=1:2
        keys_zone=HLS:50m
        max_size=1g
        inactive=60s
        use_temp_path=off;

    proxy_cache_key  "$request_uri";

    # Required for dynamic proxy_pass with variables
    resolver 169.254.169.253 valid=10s ipv6=off;

    # Send SNI when connecting to upstream — required for Cloudflare-hosted origins
    proxy_ssl_server_name on;

    ############################################################################
    # Real IP from Cloudflare (update from https://www.cloudflare.com/ips-v4)
    ############################################################################
    real_ip_header     CF-Connecting-IP;
    set_real_ip_from   103.21.244.0/22;
    set_real_ip_from   103.22.200.0/22;
    set_real_ip_from   103.31.4.0/22;
    set_real_ip_from   104.16.0.0/13;
    set_real_ip_from   104.24.0.0/14;
    set_real_ip_from   108.162.192.0/18;
    set_real_ip_from   131.0.72.0/22;
    set_real_ip_from   141.101.64.0/18;
    set_real_ip_from   162.158.0.0/15;
    set_real_ip_from   172.64.0.0/13;
    set_real_ip_from   173.245.48.0/20;
    set_real_ip_from   188.114.96.0/20;
    set_real_ip_from   190.93.240.0/20;
    set_real_ip_from   197.234.240.0/22;
    set_real_ip_from   198.41.128.0/17;

    ############################################################################
    # Rate limiting — 300 req/min per real client IP, burst 50
    ############################################################################
    limit_req_zone $binary_remote_addr zone=hls_rate:10m rate=300r/m;

    include /etc/nginx/conf.d/*.conf;
}
