################################################################################
# /etc/nginx/conf.d/hls-http-settings.conf
# Drop-in http-context additions for bare-metal installs.
# Safe alongside an existing nginx — only adds new named zones, does not
# override any global defaults that could affect other vhosts.
################################################################################

proxy_cache_path  /var/cache/nginx/hls
    levels=1:2
    keys_zone=HLS:50m
    max_size=1g
    inactive=60s
    use_temp_path=off;

proxy_cache_key  "$request_uri";

# Public DNS — required for dynamic proxy_pass with variables
resolver 8.8.8.8 1.1.1.1 valid=10s ipv6=off;

# Send SNI when connecting to upstream — required for Cloudflare-hosted origins
proxy_ssl_server_name on;

# Rate-limit zone — 300 req/min per client IP, burst 50
limit_req_zone $binary_remote_addr zone=hls_rate:10m rate=300r/m;

# Real IP from Cloudflare — only needed if Cloudflare sits in front of this host.
real_ip_header     CF-Connecting-IP;
set_real_ip_from   103.21.244.0/22;
set_real_ip_from   103.22.200.0/22;
set_real_ip_from   103.31.4.0/22;
set_real_ip_from   104.16.0.0/13;
set_real_ip_from   104.24.0.0/14;
set_real_ip_from   108.162.192.0/18;
set_real_ip_from   131.0.72.0/22;
set_real_ip_from   141.101.64.0/18;
set_real_ip_from   162.158.0.0/15;
set_real_ip_from   172.64.0.0/13;
set_real_ip_from   173.245.48.0/20;
set_real_ip_from   188.114.96.0/20;
set_real_ip_from   190.93.240.0/20;
set_real_ip_from   197.234.240.0/22;
set_real_ip_from   198.41.128.0/17;
