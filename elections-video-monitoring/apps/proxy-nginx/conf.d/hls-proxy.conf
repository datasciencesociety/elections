################################################################################
# /etc/nginx/conf.d/hls-proxy.conf
# URL scheme: /{hostname}/{path} → https://{hostname}/{path}
# Only evideo.bg and subdomains are allowed.
################################################################################

server {
    listen      8666;
    server_name _;

    # Proxy performance — scoped here to avoid affecting other vhosts
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_connect_timeout   5s;
    proxy_send_timeout      15s;
    proxy_read_timeout      30s;
    proxy_buffer_size       16k;
    proxy_buffers           8  64k;
    proxy_busy_buffers_size 128k;

    # Reject non-standard HTTP methods
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    location = /healthz {
        access_log off;
        return 200 "OK\n";
    }

    # .m3u8 playlists — 2 s cache, browser must not cache
    location ~ ^/((?:[a-z0-9-]+\.)*evideo\.bg)(/.+\.m3u8.*)$ {
        limit_req zone=hls_rate burst=30 nodelay;
        include /etc/nginx/conf.d/_cors_preflight.inc;
        set $ups_host $1;
        set $ups_path $2;
        proxy_pass https://$ups_host$ups_path$is_args$args;
        proxy_set_header Host $ups_host;
        include /etc/nginx/conf.d/_proxy_headers.inc;
        include /etc/nginx/conf.d/_cors_headers.inc;
        proxy_cache             HLS;
        proxy_cache_valid       200 2s;
        proxy_cache_valid       206 2s;
        proxy_cache_use_stale   error timeout updating invalid_header;
        proxy_cache_background_update on;
        proxy_cache_lock        on;
        proxy_cache_lock_timeout 2s;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Upstream-Response-Time $upstream_response_time always;
        add_header Cache-Control "no-store" always;
    }

    # .ts / .m4s segments — 20 s cache
    location ~ ^/((?:[a-z0-9-]+\.)*evideo\.bg)(/.+\.(ts|m4s).*)$ {
        limit_req zone=hls_rate burst=30 nodelay;
        include /etc/nginx/conf.d/_cors_preflight.inc;
        set $ups_host $1;
        set $ups_path $2;
        proxy_pass https://$ups_host$ups_path$is_args$args;
        proxy_set_header Host $ups_host;
        include /etc/nginx/conf.d/_proxy_headers.inc;
        include /etc/nginx/conf.d/_cors_headers.inc;
        proxy_cache             HLS;
        proxy_cache_valid       200 20s;
        proxy_cache_valid       206 20s;
        proxy_cache_use_stale   error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock        on;
        proxy_cache_lock_timeout 5s;
        proxy_set_header Range "";
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Upstream-Response-Time $upstream_response_time always;
        add_header Cache-Control "public, max-age=20" always;
    }

    # Everything else (.mp4, AES keys, init segments, etc.) — pure passthrough, no buffering/cache
    # MP4 files need range requests to work; buffering and caching break seeking.
    location ~ ^/((?:[a-z0-9-]+\.)*evideo\.bg)(/.+)$ {
        limit_req zone=hls_rate burst=50 nodelay;
        include /etc/nginx/conf.d/_cors_preflight.inc;
        set $ups_host $1;
        set $ups_path $2;
        proxy_pass https://$ups_host$ups_path$is_args$args;
        proxy_set_header Host $ups_host;
        include /etc/nginx/conf.d/_proxy_headers.inc;
        include /etc/nginx/conf.d/_cors_headers.inc;
        proxy_buffering  off;
        proxy_cache      off;
        add_header X-Cache-Status BYPASS always;
    }

    # Reject anything that doesn't match /{evideo-host}/path
    location / {
        return 403 "Invalid proxy path\n";
    }
}
