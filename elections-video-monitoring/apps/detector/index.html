<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream Freeze Detector</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/i18n-js@4.5.3/dist/browser/index.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section id="status-panel" class="status-idle">
      <div class="status-icon" id="status-icon">⏸</div>
      <div class="status-body">
        <div class="status-text" id="status-text" data-i18n="idle">Idle — enter a URL to begin</div>
        <div class="status-sub" id="status-sub"></div>
      </div>
    </section>

<!-- Metrics Row -->
    <details class="collapsible-section" open>
    <summary>Metrics</summary>
    <section class="metrics-row" id="metrics-row">
      <div class="metric">
        <span class="metric-label" data-i18n="metric.luma">Luminance</span>
        <span class="metric-value" id="m-luma">—</span>
      </div>
      <div class="metric">
        <span class="metric-label" data-i18n="metric.diff">Motion Diff</span>
        <span class="metric-value" id="m-diff">—</span>
      </div>
      <div class="metric">
        <span class="metric-label" data-i18n="metric.cover">Cover Ratio</span>
        <span class="metric-value" id="m-cover">—</span>
      </div>
      <div class="metric">
        <span class="metric-label" data-i18n="metric.frozen">Frozen For</span>
        <span class="metric-value" id="m-frozen">—</span>
      </div>
      <div class="metric">
        <span class="metric-label" data-i18n="metric.rectime">Rec. Time</span>
        <span class="metric-value" id="m-rectime">—</span>
      </div>
      <div class="metric">
        <span class="metric-label" data-i18n="metric.lastcheck">Last Check</span>
        <span class="metric-value" id="m-last-check">—</span>
      </div>
    </section>
    </details>

    <!-- Stream Preview + Canvas (hidden) -->
    <section class="card preview-section">
      <div class="preview-url-row">
        <input type="text" id="stream-url" data-i18n-placeholder="url.placeholder" placeholder="Enter HLS (.m3u8) or video stream URL…" autocomplete="off" spellcheck="false">
        <button id="btn-start" class="btn-primary" title="Start Monitoring">▶</button>
        <button id="btn-stop" class="btn-danger" title="Stop" disabled>⏹</button>
        <button id="btn-open-url" class="btn-open-url" title="Open in new tab">↗</button>
      </div>
      <div class="video-container">
        <video id="video" crossorigin="anonymous" muted autoplay playsinline></video>
        <div class="video-overlay" id="video-overlay">
          <button id="btn-maximize-video" class="vid-btn maximize-btn" title="Maximize">⛶</button>
          <a id="btn-signal-video" class="vid-btn signal-btn" href="https://tally.so/r/ODB8oY" target="_blank" rel="noopener noreferrer" data-i18n="btn.signal">Подай сигнал</a>
          <button id="btn-call-video" class="vid-btn call-btn" data-i18n="btn.call">Позвъни</button>
          <div id="phone-popup-video" class="phone-popup">
            <h4 data-i18n="btn.call.title">Телефони за контакт</h4>
            <ul><li class="no-contacts" data-i18n="call.nodata">Няма налични контакти</li></ul>
          </div>
        </div>
      </div>
      <canvas id="canvas" width="320" height="180"></canvas>
    </section>

    <!-- Config Panel -->
    <details class="card config-panel" id="config-panel">
      <summary data-i18n="config.title">Configuration</summary>
      <div class="config-grid">
        <label><span data-i18n="config.interval">Check Interval (s)</span>
          <input type="number" id="cfg-interval" min="1" max="60" value="1">
        </label>
        <label><span data-i18n="config.freeze">Freeze Alert Threshold (s)</span>
          <input type="number" id="cfg-freeze-min" min="30" max="3600" value="300">
        </label>
        <label><span data-i18n="config.motion">Motion Sensitivity (diff threshold)</span>
          <input type="range" id="cfg-motion-threshold" min="1" max="50" value="5">
          <span id="cfg-motion-val">5</span>
        </label>
        <label><span data-i18n="config.coverarea">Cover Area Threshold (%)</span>
          <input type="number" id="cfg-cover-area" min="10" max="100" value="50">
        </label>
        <label><span data-i18n="config.coverdur">Cover Duration Threshold (s)</span>
          <input type="number" id="cfg-cover-duration" min="5" max="300" value="30">
        </label>
        <label><span data-i18n="config.covervar">Cover Variance Sensitivity</span>
          <input type="range" id="cfg-cover-variance" min="5" max="200" value="40">
          <span id="cfg-cover-var-val">40</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="cfg-low-cpu"> <span data-i18n="config.lowcpu">Low CPU mode (160×90)</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="cfg-notif"> <span data-i18n="config.notif">Browser notifications</span>
          <button id="btn-test-notif" class="btn-small" data-i18n="btn.testnotif">Test</button>
        </label>
      </div>
      <button id="btn-reset-config" class="btn-secondary" data-i18n="config.reset">Reset to Defaults</button>
    </details>

    <!-- Alert Log -->
    <details class="card collapsible-section" id="log-section" open>
      <summary class="log-header">
        <h2 data-i18n="log.title">Alert Log</h2>
      </summary>
      <div style="display:flex;gap:.3rem;margin-bottom:.75rem">
        <button id="btn-copy-log" class="btn-small" data-i18n="btn.copy">Copy</button>
        <button id="btn-clear-log" class="btn-small" data-i18n="btn.clear">Clear</button>
      </div>
      <div id="alert-log"></div>
    </details>
  </main>

  <footer>
    <span data-i18n="footer">Runs 100% in browser</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
  <script src="i18n.js"></script>
  <script src="detection-core.js"></script>
  <script>applyTranslations();</script>
  <script src="app.js"></script>
</body>
</html>
