<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="header.title">Stream Monitor</title>
<script src="i18n.js"></script>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #111;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-muted: #888;
  --text-dim: #ccc;
  --text-metrics: #aaa;
  --placeholder: #333;
  --loading: #555;
  --hg: #666;
  --vol-off: #444;
  --card-ok-border: #166534;   --card-ok-bg: #0a1a0a;
  --card-cov-border: #991b1b;  --card-cov-bg: #1a0808;
  --card-frz-border: #92400e;  --card-frz-bg: #1a0e00;
  --card-drk-border: #1e3a5f;  --card-drk-bg: #080d1a;
  --card-err-border: #4a1d1d;  --card-err-bg: #120808;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-dim: #374151;
    --text-metrics: #6b7280;
    --placeholder: #cbd5e1;
    --loading: #94a3b8;
    --hg: #9ca3af;
    --vol-off: #cbd5e1;
    --card-ok-border: #16a34a;   --card-ok-bg: #f0fdf4;
    --card-cov-border: #dc2626;  --card-cov-bg: #fef2f2;
    --card-frz-border: #d97706;  --card-frz-bg: #fff7ed;
    --card-drk-border: #2563eb;  --card-drk-bg: #eff6ff;
    --card-err-border: #f87171;  --card-err-bg: #fef2f2;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
#status-bar { font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; }
#status-bar span { display: flex; align-items: center; gap: 4px; }
#vol-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--vol-off); display: inline-block; }
#vol-indicator.active { background: #22c55e; }

/* ── Two-pane layout ──────────────────────────────────────────────────────── */
#main-layout {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

#stream-panel {
  flex: 0 0 min(55%, 660px);
  min-width: 0;
  overflow: hidden auto;
  border-right: 1px solid var(--border);
}

#stream-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  padding: 12px;
}

/* ── Sheet header (mobile-only bottom-sheet inspect) ──────────────────────── */
#sheet-header { display: none; }

/* ── Responsive breakpoints ───────────────────────────────────────────────── */
@media (max-width: 700px) {
  header { padding: 8px 12px; gap: 10px; }
  header h1 { font-size: 13px; }
  #status-bar { font-size: 11px; gap: 10px; }

  #main-layout { flex-direction: column; }

  #stream-panel {
    flex: 1;
    width: 100%;
    border-right: none;
  }

  #stream-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
    padding: 8px;
    padding-bottom: 24px;
  }

  .stream-card { min-width: 0; }

  .stream-card { padding: 6px; min-height: 44px; gap: 3px; }
  .card-label { font-size: 11px; }
  .card-status { font-size: 11px; }
  .card-metrics {
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .status-dot { width: 10px; height: 10px; }

  /* Inspect panel becomes a bottom-sheet overlay */
  #inspect-panel {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 60vh;
    height: 60dvh;
    transform: translateY(100%);
    transition: transform 0.25s ease-out;
    z-index: 50;
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.4);
  }
  #inspect-panel.sheet-open { transform: translateY(0); }
  #inspect-placeholder { display: none; }

  #sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }
  #sheet-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  #sheet-close {
    background: none;
    border: none;
    color: var(--text);
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    padding: 0 8px;
    min-width: 44px;
    min-height: 36px;
    flex-shrink: 0;
  }

  #overlay h2 { font-size: 18px; }
  #overlay p { font-size: 13px; padding: 0 16px; }
  #overlay button { padding: 12px 28px; font-size: 15px; }
}

/* ── Add section button ──────────────────────────────────────────────────── */
#add-section-btn {
  display: block;
  width: calc(100% - 24px);
  margin: 0 12px 12px;
  padding: 8px;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  text-align: center;
}
#add-section-btn:hover { border-color: #3b82f6; color: #3b82f6; }

/* ── Section picker modal ────────────────────────────────────────────────── */
#section-modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#section-modal-overlay.open { display: flex; }

#section-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: min(420px, 90vw);
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#section-modal-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
#section-modal-header h3 { font-size: 14px; font-weight: 600; }
#section-modal-close { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; }
#section-filter {
  width: 100%;
  padding: 8px 14px;
  border: none;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  outline: none;
}
#section-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.section-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  font-size: 12px;
  cursor: pointer;
}
.section-item:hover { background: var(--surface2); }
.section-item input[type="checkbox"] { flex-shrink: 0; }
.section-item .section-id { font-weight: 600; color: var(--text); }
.section-item .section-label { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.section-empty { padding: 20px 14px; text-align: center; color: var(--text-muted); font-size: 12px; }
#section-modal-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#section-modal-footer span { font-size: 11px; color: var(--text-muted); }
#section-add-btn {
  padding: 6px 16px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
}
#section-add-btn:disabled { opacity: 0.4; cursor: default; }

/* ── Remove button on cards ──────────────────────────────────────────────── */
.card-remove {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px; height: 18px;
  background: rgba(0,0,0,0.6);
  border: none;
  border-radius: 50%;
  color: #f87171;
  font-size: 13px;
  line-height: 18px;
  text-align: center;
  cursor: pointer;
  display: none;
  padding: 0;
}
.stream-card.manual .card-remove { display: block; }
.card-remove:hover { background: rgba(220,38,38,0.8); color: #fff; }

/* ── Inspect pane ─────────────────────────────────────────────────────────── */
#inspect-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface2);
}

#inspect-placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--placeholder);
  font-size: 13px;
}

#inspect-frame {
  flex: 1;
  border: none;
  width: 100%;
  display: none;
}

#inspect-loading {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-dim);
  font-size: 12px;
}

.iframe-spinner {
  width: 28px;
  height: 28px;
  border: 3px solid var(--border);
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Stream cards ─────────────────────────────────────────────────────────── */
.stream-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: border-color 0.3s;
}
.stream-card.ok      { border-color: var(--card-ok-border);  background: var(--card-ok-bg); }
.stream-card.covered { border-color: var(--card-cov-border); background: var(--card-cov-bg); }
.stream-card.frozen  { border-color: var(--card-frz-border); background: var(--card-frz-bg); }
.stream-card.dark    { border-color: var(--card-drk-border); background: var(--card-drk-bg); }
.stream-card.error   { border-color: var(--card-err-border); background: var(--card-err-bg); }
.stream-card.selected { outline: 2px solid #3b82f6; outline-offset: -1px; }

.card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 3px;
  background: #000;
  display: block;
}

.card-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-status-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  flex: 1;
  min-width: 0;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.dot-init    { background: var(--vol-off); }
.dot-ok      { background: #22c55e; }
.dot-covered { background: #ef4444; }
.dot-frozen  { background: #f97316; }
.dot-dark    { background: #3b82f6; }
.dot-error   { background: #6b7280; }
.dot-loading { background: #a855f7; }

.card-metrics { font-size: 12px; color: var(--text-metrics); }

.stream-card { cursor: pointer; position: relative; }
.stream-card:hover { border-color: #3b82f6 !important; }

.card-star {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 14px;
  height: 14px;
  color: #facc15;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.7));
  pointer-events: none;
}

/* ── Overlay ──────────────────────────────────────────────────────────────── */
#overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; z-index: 100;
}
#overlay h2 { font-size: 20px; color: #fff; }
#overlay p  { font-size: 14px; color: #aaa; text-align: center; max-width: 360px; }
#overlay button {
  padding: 12px 32px; background: #2563eb; color: #fff;
  border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
}
#overlay button:hover { background: #1d4ed8; }
#overlay.hidden { display: none; }

#loading-msg { padding: 32px; text-align: center; color: var(--loading); }

/* ── Hourglass icon ───────────────────────────────────────────────────────── */
.hg-icon {
  width: 9px;
  height: 14px;
  flex-shrink: 0;
  overflow: visible;
  color: var(--hg);
}
@keyframes hg-top {
  from { transform: scaleY(1); }
  to   { transform: scaleY(0); }
}
@keyframes hg-bot {
  from { transform: scaleY(0); }
  to   { transform: scaleY(1); }
}

/* ── Feature 6: Hide card label ──────────────────────────────────────────── */
.card-label { display: none; }

/* ── Help link ───────────────────────────────────────────────────────────── */
.header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
#help-link {
  font-size: 11px; padding: 3px 8px;
  background: var(--surface2); color: var(--text-muted);
  border: 1px solid var(--border); border-radius: 4px;
  text-decoration: none; cursor: pointer;
}
#help-link:hover { color: var(--text); }

/* ── Inspect content wrapper ─────────────────────────────────────────────── */
#inspect-content {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* ── Maximize mode (mobile + landscape phones) ──────────────────────────── */
@media (max-width: 700px), (pointer: coarse) and (max-height: 600px) {
  body.maximized #inspect-panel {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    height: 100vh; height: 100dvh;
    width: 100vw;
    z-index: 200;
    transform: none;
  }
  body.maximized #sheet-header { display: none; }
}
</style>
</head>
<body>

<header>
  <h1 data-i18n="header.title">Election Stream Monitor</h1>
  <div id="status-bar">
    <span><span id="vol-indicator"></span> <span id="session-label" data-i18n="session.connecting">connecting…</span></span>
    <span id="stream-count"></span>
    <span id="last-report-label"></span>
  </div>
  <div class="header-actions">
    <a id="help-link" href="/help" data-i18n="help.link">Help</a>
    <button id="lang-toggle" style="font-size:11px;padding:3px 8px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);border-radius:4px;cursor:pointer;">EN</button>
  </div>
</header>

<div id="main-layout">
  <div id="stream-panel">
    <div id="stream-grid"><p id="loading-msg" data-i18n="loading.connecting">Connecting to coordinator…</p></div>
    <button id="add-section-btn" data-i18n="add.section" style="display:none">+ Add section</button>
  </div>

  <div id="section-modal-overlay">
    <div id="section-modal">
      <div id="section-modal-header">
        <h3 data-i18n="modal.title">Available Sections</h3>
        <button id="section-modal-close">×</button>
      </div>
      <input type="text" id="section-filter" data-i18n-placeholder="modal.filter" placeholder="Filter sections…">
      <div id="section-list"></div>
      <div id="section-modal-footer">
        <span id="section-selected-count"></span>
        <button id="section-add-btn" disabled data-i18n="modal.add">Add selected</button>
      </div>
    </div>
  </div>

  <div id="inspect-panel">
    <div id="sheet-header">
      <div id="sheet-label"></div>
      <button id="sheet-close" aria-label="Close">×</button>
    </div>
    <div id="inspect-content">
      <div id="inspect-placeholder" data-i18n="inspect.placeholder">← select a stream to inspect</div>
      <div id="inspect-loading" style="display:none">
        <div class="iframe-spinner"></div>
        <div id="inspect-loading-label"></div>
      </div>
      <iframe id="inspect-frame" allow="autoplay"></iframe>
    </div>
  </div>
</div>

<div id="overlay">
  <h2 data-i18n="overlay.title">Stream Monitor</h2>
  <p data-i18n="overlay.body">Your browser needs to autoplay muted video streams. Click Start to begin monitoring.</p>
  <button id="start-btn" data-i18n="overlay.start">Start Monitoring</button>
</div>

<!-- Hidden video container -->
<div id="video-container" style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden"></div>
<!-- Hidden canvas container -->
<div id="canvas-container" style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden"></div>

<!-- Hourglass symbol — defined once, reused via <use href="#hg"> -->
<svg style="display:none" aria-hidden="true">
  <symbol id="star" viewBox="0 0 16 16">
    <path d="M8 1l1.85 3.75L14 5.65l-3 2.92.71 4.13L8 10.75l-3.71 1.95.71-4.13-3-2.92 4.15-.9z"
          fill="currentColor"/>
  </symbol>
  <symbol id="hg" viewBox="0 0 10 16">
    <!-- frame: two triangles sharing a neck at (5,8) -->
    <path d="M1 1.5 L9 1.5 L5 8 L9 14.5 L1 14.5 L5 8 Z"
          fill="none" stroke="currentColor" stroke-width="0.9" stroke-linejoin="round"/>
    <!-- top sand: fills top chamber, anchored at neck so it drains downward -->
    <polygon points="1.8,2 8.2,2 5,7.5" fill="#d97706"
             style="transform-box:fill-box;transform-origin:center bottom;animation:hg-top 30s linear infinite"/>
    <!-- bottom sand: fills bottom chamber, anchored at bottom so it fills upward -->
    <polygon points="1.8,14 8.2,14 5,8.5" fill="#d97706"
             style="transform-box:fill-box;transform-origin:center bottom;animation:hg-bot 30s linear infinite"/>
  </symbol>
</svg>

<script src="detection-core.js"></script>
<script>
const DETECTOR_URL = '/inspect/';

// ── Detection constants ───────────────────────────────────────────────────────
const COVER_VARIANCE_THRESHOLD = 40;
const COVER_AREA_THRESHOLD = 0.50;
const COVER_DURATION_THRESHOLD_SEC = 30;
const FROZEN_THRESHOLD_SEC = 120;
const DARK_THRESHOLD = 15;
const MOTION_THRESHOLD = 5;
const CHECK_INTERVAL_MS = 30_000;
const REPORT_INTERVAL_MS = 30_000;
const HEARTBEAT_INTERVAL_MS = 60_000;
const CANVAS_W = 320, CANVAS_H = 180;
const LS_SESSION_KEY = 'volunteer_session_id';
const LS_USER_ID_KEY  = 'volunteer_user_id';
const LS_MANUAL_KEY   = 'volunteer_manual_streams';

// ── State ─────────────────────────────────────────────────────────────────────
let SESSION_ID = null;
// TODO: replace USER_ID with a real user ID provided by the auth layer at login.
// For now we derive a stable stub from the first session ID and persist it in
// localStorage so it survives session resets (e.g. stream-count change).
let USER_ID    = localStorage.getItem(LS_USER_ID_KEY) || null;
let streamStates = [];
let autoplayBlocked = false;
let _lastResumed = false;
let intervals = [];

// ── Session init ──────────────────────────────────────────────────────────────
async function init() {
  let data;
  try {
    const savedId = localStorage.getItem(LS_SESSION_KEY);
    const res = await fetch('/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ...(savedId ? { session_id: savedId } : {}),
        ...(USER_ID ? { user_id: USER_ID }   : {}),
      }),
    });
    data = await res.json();
  } catch (e) {
    document.getElementById('loading-msg').textContent = t('connect.failed');
    setTimeout(init, 10_000);
    return;
  }

  SESSION_ID = data.session_id;
  _lastResumed = data.resumed;
  // Derive stub user ID from last 6 chars of the first session ID; persist so it
  // stays the same if the session is reset.  Replace with real auth user ID later.
  if (!USER_ID) {
    USER_ID = SESSION_ID.slice(-6);
    localStorage.setItem(LS_USER_ID_KEY, USER_ID);
  }
  localStorage.setItem(LS_SESSION_KEY, SESSION_ID);
  document.getElementById('session-label').textContent =
    t(data.resumed ? 'session.resumed' : 'session.new') + ' ' + SESSION_ID.slice(0, 8) + ' · #' + USER_ID;

  const grid = document.getElementById('stream-grid');
  grid.innerHTML = '';

  const manualIds = new Set(JSON.parse(localStorage.getItem(LS_MANUAL_KEY) || '[]'));
  for (const stream of data.streams) {
    if (manualIds.has(stream.id)) stream._manual = true;
    setupStream(stream);
  }

  document.getElementById('stream-count').textContent =
    tf('monitoring.count', { n: streamStates.length });

  document.getElementById('add-section-btn').style.display = '';

  // Try autoplay
  const playPromises = streamStates.map(s => s.video.play().catch(() => null));
  const results = await Promise.allSettled(playPromises);
  const anyBlocked = results.some(r => r.status === 'rejected');
  if (anyBlocked) {
    document.getElementById('overlay').classList.remove('hidden');
    autoplayBlocked = true;
  } else {
    document.getElementById('overlay').classList.add('hidden');
  }

  intervals.push(
    setInterval(checkAllStreams, CHECK_INTERVAL_MS),
    setInterval(updateThumbnails, 1_000),
    setInterval(sendReport, REPORT_INTERVAL_MS),
    setInterval(sendHeartbeat, HEARTBEAT_INTERVAL_MS)
  );
}

document.getElementById('start-btn').addEventListener('click', () => {
  streamStates.forEach(s => s.video.play().catch(() => {}));
  document.getElementById('overlay').classList.add('hidden');
  autoplayBlocked = false;
});

// ── Stream setup ──────────────────────────────────────────────────────────────
function isAssignedToMe(stream) {
  if (!stream.assigned_users || !USER_ID) return false;
  return (',' + stream.assigned_users + ',').includes(',' + USER_ID + ',');
}

function setupStream(stream) {
  // Route through proxy. PROXY_BASE is injected by the server (see server.js);
  // defaults to coordinator's own /proxy if not set.
  const _proxyBase = (typeof window !== 'undefined' && window.PROXY_BASE) || (location.origin + '/proxy');
  const _u = new URL(stream.url);
  const proxiedUrl = _proxyBase + '/' + _u.hostname + _u.pathname + _u.search;

  const video = document.createElement('video');
  video.muted = true;
  video.autoplay = true;
  video.playsInline = true;
  video.preload = 'auto';
  video.crossOrigin = 'anonymous';
  video.src = proxiedUrl;
  document.getElementById('video-container').appendChild(video);

  const canvas = document.createElement('canvas');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  document.getElementById('canvas-container').appendChild(canvas);

  const isManual = !!stream._manual;
  const state = {
    id: stream.id,
    url: stream.url,
    label: stream.label,
    contacts: stream.contacts || [],
    manual: isManual,
    video,
    canvas,
    ctx: canvas.getContext('2d', { willReadFrequently: true }),
    lastFrameData: null,
    lastChangeTime: null,
    coverStartTime: null,
    status: 'initializing',
    coverRatio: 0,
    frozenSec: 0,
    luma: 0,
    errorCount: 0,
    recStart: parseRecordingStart(stream.url),
  };
  streamStates.push(state);

  const assigned = isAssignedToMe(stream);

  // Build card
  const card = document.createElement('div');
  card.className = 'stream-card' + (isManual ? ' manual' : '');
  card.dataset.streamId = stream.id;
  card.innerHTML = `
    <button class="card-remove" title="${t('remove.section')}">×</button>
    <div class="card-metrics"></div>
    <canvas class="card-thumb" width="192" height="108"></canvas>
    ${assigned ? '<svg class="card-star" aria-label="assigned"><use href="#star"/></svg>' : ''}
    <div class="card-label" title="${escHtml(stream.label)}">${escHtml(stream.label)}</div>
    <div class="card-status-row">
      <div class="card-status">
        <svg class="hg-icon" aria-hidden="true"><use href="#hg"/></svg>
        <span class="status-dot dot-init"></span>
        <span class="status-text">${t('status.initializing')}</span>
      </div>
    </div>
  `;

  // Remove button handler (only works for manually-added streams)
  card.querySelector('.card-remove').addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!state.manual) return;
    try {
      await fetch('/api/session/streams', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, stream_id: state.id }),
      });
    } catch (_) {}
    // Tear down
    state.video.pause();
    state.video.src = '';
    state.video.load();
    state.video.remove();
    state.canvas.remove();
    card.remove();
    streamStates = streamStates.filter(s => s !== state);
    // Remove from localStorage manual list
    const saved = new Set(JSON.parse(localStorage.getItem(LS_MANUAL_KEY) || '[]'));
    saved.delete(state.id);
    localStorage.setItem(LS_MANUAL_KEY, JSON.stringify([...saved]));
    document.getElementById('stream-count').textContent =
      tf('monitoring.count', { n: streamStates.length });
  });
  state.thumbCanvas = card.querySelector('.card-thumb');
  state.thumbCtx    = state.thumbCanvas.getContext('2d', { willReadFrequently: true });

  // Draw placeholder until first real video frame arrives
  (function(ctx, w, h) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, w, h);
    const cx = w / 2, cy = h / 2 - 6;
    // Camera body
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - 22, cy - 12, 44, 26);
    // Lens
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI * 2);
    ctx.stroke();
    // Label
    ctx.fillStyle = '#555';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('waiting for stream…', cx, cy + 20);
  })(state.thumbCtx, 192, 108);

  card.addEventListener('click', function () {
    const t = Math.floor(state.video.currentTime) || 0;
    const url = `${DETECTOR_URL}?url=${encodeURIComponent(stream.url)}&t=${t}&audio=1`;

    document.querySelectorAll('.stream-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');

    const frame = document.getElementById('inspect-frame');
    const placeholder = document.getElementById('inspect-placeholder');
    const loading = document.getElementById('inspect-loading');
    document.getElementById('inspect-loading-label').textContent = stream.label;
    placeholder.style.display = 'none';
    frame.style.display = 'none';
    loading.style.display = 'flex';
    frame.onload = () => {
      loading.style.display = 'none';
      frame.style.display = 'block';
      if (frame.contentWindow && state.contacts && state.contacts.length) {
        frame.contentWindow.postMessage({ type: 'contacts', contacts: state.contacts }, '*');
      }
    };
    frame.src = url;
    document.getElementById('sheet-label').textContent = stream.label;
    document.getElementById('inspect-panel').classList.add('sheet-open');
  });

  document.getElementById('stream-grid').appendChild(card);
}

// ── Thumbnails ────────────────────────────────────────────────────────────────
function updateThumbnails() {
  for (const state of streamStates) {
    if (state.video.readyState < 2 || !state.thumbCtx) continue;
    try {
      state.thumbCtx.drawImage(state.video, 0, 0, 192, 108);
    } catch (e) { /* ignore taint or decode errors */ }
  }
}

// ── Detection ─────────────────────────────────────────────────────────────────
function checkAllStreams() {
  const now = Date.now();
  for (const state of streamStates) checkStream(state, now);
}

function checkStream(state, now) {
  const { video, canvas, ctx } = state;

  if (video.readyState < 2) {
    state.status = 'loading';
    updateCard(state);
    return;
  }

  ctx.drawImage(video, 0, 0, CANVAS_W, CANVAS_H);
  let imageData;
  try {
    imageData = ctx.getImageData(0, 0, CANVAS_W, CANVAS_H);
  } catch (e) {
    state.status = 'error';
    state.errorCount++;
    updateCard(state);
    return;
  }

  const data = imageData.data;
  state.luma = computeLuminance(data);

  // Freeze
  if (state.lastFrameData) {
    if (computeDiff(state.lastFrameData, data) > MOTION_THRESHOLD)
      state.lastChangeTime = now;
  } else {
    state.lastChangeTime = now;
  }
  state.lastFrameData = new Uint8ClampedArray(data);
  state.frozenSec = state.lastChangeTime ? (now - state.lastChangeTime) / 1000 : 0;

  // Cover
  state.coverRatio = computeCoverRatio(data, CANVAS_W, CANVAS_H, COVER_VARIANCE_THRESHOLD);
  if (state.coverRatio >= COVER_AREA_THRESHOLD) {
    if (!state.coverStartTime) state.coverStartTime = now;
  } else {
    state.coverStartTime = null;
  }
  const coverDurSec = state.coverStartTime ? (now - state.coverStartTime) / 1000 : 0;

  // Recording wall-clock time
  state.recTime = state.recStart
    ? new Date(state.recStart.getTime() + video.currentTime * 1000)
        .toLocaleTimeString('bg-BG', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Sofia' })
    : null;

  // Classify
  if (state.coverRatio >= COVER_AREA_THRESHOLD && coverDurSec >= COVER_DURATION_THRESHOLD_SEC) {
    state.status = 'covered';
  } else if (state.luma < DARK_THRESHOLD) {
    state.status = 'dark';
  } else if (state.frozenSec >= FROZEN_THRESHOLD_SEC) {
    state.status = 'frozen';
  } else {
    state.status = 'ok';
  }

  updateCard(state);
}

function updateCard(state) {
  const card = document.querySelector(`[data-stream-id="${state.id}"]`);
  if (!card) return;

  const wasSelected = card.classList.contains('selected');
  const wasManual = card.classList.contains('manual');
  card.className = `stream-card ${state.status}${wasSelected ? ' selected' : ''}${wasManual ? ' manual' : ''}`;

  const dotClass = {
    initializing: 'dot-init',
    loading:  'dot-loading',
    ok:       'dot-ok',
    covered:  'dot-covered',
    frozen:   'dot-frozen',
    dark:     'dot-dark',
    error:    'dot-error',
  }[state.status] || 'dot-init';

  const statusLabel = {
    initializing: t('status.initializing'),
    loading:  t('status.loading'),
    ok:       t('status.ok'),
    covered:  t('status.covered'),
    frozen:   t('status.frozen'),
    dark:     t('status.dark'),
    error:    t('status.error'),
  }[state.status] || state.status;

  card.querySelector('.status-dot').className = `status-dot ${dotClass}`;
  card.querySelector('.status-text').textContent = statusLabel;
  const activeStatus = state.status === 'ok' || state.status === 'covered' || state.status === 'frozen' || state.status === 'dark';
  card.querySelector('.card-metrics').textContent = activeStatus
    ? `cover=${(state.coverRatio*100).toFixed(0)}% luma=${state.luma.toFixed(0)} frozen=${state.frozenSec.toFixed(0)}s${state.recTime ? ' · ' + state.recTime : ''}`
    : '';
}

// ── Reporting ─────────────────────────────────────────────────────────────────
async function sendReport() {
  if (!SESSION_ID) return;
  const results = streamStates.map(s => ({
    stream_id: s.id,
    status: s.status,
    cover_ratio: s.coverRatio,
    frozen_sec: s.frozenSec,
    luma: s.luma,
  }));
  try {
    const res = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID, results }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (err.reinit) { reinitSession(); return; }
    } else {
      document.getElementById('last-report-label').textContent =
        t('last.report') + ' ' + new Date().toLocaleTimeString('bg-BG', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Sofia' });
    }
  } catch (e) { /* silent — will retry */ }
}

async function sendHeartbeat() {
  if (!SESSION_ID) return;
  try {
    const res = await fetch('/api/heartbeat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID }),
    });
    const data = await res.json().catch(() => ({}));
    if (data.reinit) { reinitSession(); return; }
    document.getElementById('vol-indicator').classList.add('active');
  } catch (e) {
    document.getElementById('vol-indicator').classList.remove('active');
  }
}

// Recover immediately when the tab comes back to the foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && SESSION_ID) sendHeartbeat();
});

// Soft reinit: keeps stream IDs in localStorage so the same sections are reclaimed
function reinitSession() {
  localStorage.removeItem(LS_SESSION_KEY);
  SESSION_ID = null;
  releaseAll();
  streamStates = [];
  document.getElementById('stream-grid').innerHTML = `<p id="loading-msg" data-i18n="reconnecting">${t('reconnecting')}</p>`;
  document.getElementById('stream-count').textContent = '';
  document.getElementById('session-label').textContent = t('session.connecting');
  document.getElementById('last-report-label').textContent = '';
  document.getElementById('vol-indicator').classList.remove('active');
  init();
}

// ── Page unload — release all video network connections ───────────────────────
function releaseAll() {
  intervals.forEach(id => clearInterval(id));
  intervals.length = 0;
  // Clear iframe to drop any open proxy connection
  const frame = document.getElementById('inspect-frame');
  frame.src = '';
  for (const s of streamStates) {
    try {
      s.video.pause();
      // Set src to '' then load() to abort the network fetch.
      s.video.src = '';
      s.video.load();
    } catch (e) { /* ignore */ }
  }
}
// beforeunload fires synchronously before navigation — more reliable than
// pagehide alone in Edge (which may defer pagehide via bfcache).
window.addEventListener('beforeunload', releaseAll);
window.addEventListener('pagehide', releaseAll);

// ── Tab visibility ────────────────────────────────────────────────────────────
let hiddenAt = null;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    hiddenAt = Date.now();
  } else {
    if (hiddenAt && Date.now() - hiddenAt > 5 * 60_000) {
      // Reset diff state to avoid false freeze alerts after long background
      for (const s of streamStates) {
        s.lastFrameData = null;
        s.lastChangeTime = null;
        s.coverStartTime = null;
      }
    }
    hiddenAt = null;
  }
});

// ── Util ──────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Bottom-sheet inspect (mobile) ─────────────────────────────────────────
function closeInspect() {
  if (screen.orientation && screen.orientation.unlock) {
    try { screen.orientation.unlock(); } catch (_) {}
  }
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  document.body.classList.remove('maximized');
  const frame = document.getElementById('inspect-frame');
  if (frame.contentWindow) frame.contentWindow.postMessage({ type: 'maximize', value: false }, '*');
  document.getElementById('inspect-panel').classList.remove('sheet-open');
  document.querySelectorAll('.stream-card').forEach(c => c.classList.remove('selected'));
  frame.onload = null;
  frame.src = '';
  frame.style.display = 'none';
  document.getElementById('inspect-loading').style.display = 'none';
  document.getElementById('inspect-placeholder').style.display = '';
}
document.getElementById('sheet-close').addEventListener('click', closeInspect);

// ── Maximize toggle (driven by detector iframe via postMessage) ───────────
let _maximizing = false;
function toggleMaximize() {
  if (_maximizing) return;
  _maximizing = true;
  try {
    const isMax = document.body.classList.contains('maximized');
    const frame = document.getElementById('inspect-frame');
    if (isMax) {
      if (screen.orientation && screen.orientation.unlock) {
        try { screen.orientation.unlock(); } catch (_) {}
      }
      if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
      document.body.classList.remove('maximized');
      if (frame.contentWindow) frame.contentWindow.postMessage({ type: 'maximize', value: false }, '*');
    } else {
      const isMobile = window.matchMedia('(max-width: 700px), (pointer: coarse) and (max-height: 600px)').matches;
      if (isMobile && document.getElementById('inspect-panel').requestFullscreen) {
        document.getElementById('inspect-panel').requestFullscreen().then(() => {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
          }
        }).catch(() => {});
      }
      document.body.classList.add('maximized');
      if (frame.contentWindow) frame.contentWindow.postMessage({ type: 'maximize', value: true }, '*');
    }
  } finally {
    setTimeout(() => { _maximizing = false; }, 100);
  }
}
window.addEventListener('message', (e) => {
  if (e.origin !== window.location.origin) return;
  if (e.data && e.data.type === 'toggle-maximize') toggleMaximize();
});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && document.body.classList.contains('maximized')) {
    if (screen.orientation && screen.orientation.unlock) {
      try { screen.orientation.unlock(); } catch (_) {}
    }
    document.body.classList.remove('maximized');
    const frame = document.getElementById('inspect-frame');
    if (frame.contentWindow) frame.contentWindow.postMessage({ type: 'maximize', value: false }, '*');
  }
});

// ── Section picker modal ──────────────────────────────────────────────────
(function () {
  const overlay  = document.getElementById('section-modal-overlay');
  const list     = document.getElementById('section-list');
  const filter   = document.getElementById('section-filter');
  const addBtn   = document.getElementById('section-add-btn');
  const countEl  = document.getElementById('section-selected-count');
  let available = [];
  let selected = new Set();

  function renderList(query) {
    const q = (query || '').toLowerCase();
    const filtered = q ? available.filter(s =>
      s.section.includes(q) || s.label.toLowerCase().includes(q)
    ) : available;
    list.innerHTML = '';
    if (filtered.length === 0) {
      list.innerHTML = `<div class="section-empty">${t('modal.empty')}</div>`;
      return;
    }
    for (const s of filtered) {
      const item = document.createElement('label');
      item.className = 'section-item';
      item.innerHTML = `
        <input type="checkbox" value="${s.id}" ${selected.has(s.id) ? 'checked' : ''}>
        <span class="section-id">${escHtml(s.section)}</span>
        <span class="section-label">${escHtml(s.label)}</span>
      `;
      item.querySelector('input').addEventListener('change', (e) => {
        if (e.target.checked) selected.add(s.id); else selected.delete(s.id);
        updateCount();
      });
      list.appendChild(item);
    }
  }

  function updateCount() {
    const n = selected.size;
    countEl.textContent = n ? tf('modal.selected', { n }) : '';
    addBtn.disabled = n === 0;
  }

  async function openModal() {
    selected.clear();
    filter.value = '';
    list.innerHTML = `<div class="section-empty">${t('modal.loading')}</div>`;
    overlay.classList.add('open');
    try {
      const res = await fetch('/api/streams/available');
      const data = await res.json();
      // Exclude streams already in our session
      const myIds = new Set(streamStates.map(s => s.id));
      available = data.streams.filter(s => !myIds.has(s.id));
    } catch (e) {
      available = [];
    }
    renderList();
    updateCount();
    filter.focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
  }

  document.getElementById('add-section-btn').addEventListener('click', openModal);
  document.getElementById('section-modal-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  filter.addEventListener('input', () => renderList(filter.value));

  addBtn.addEventListener('click', async () => {
    if (selected.size === 0) return;
    addBtn.disabled = true;
    addBtn.textContent = '…';
    try {
      const res = await fetch('/api/session/streams', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, stream_ids: [...selected] }),
      });
      const data = await res.json();
      const savedManual = new Set(JSON.parse(localStorage.getItem(LS_MANUAL_KEY) || '[]'));
      for (const stream of data.added) {
        stream._manual = true;
        savedManual.add(stream.id);
        setupStream(stream);
        // Auto-play the new stream
        const newState = streamStates[streamStates.length - 1];
        newState.video.play().catch(() => {});
      }
      localStorage.setItem(LS_MANUAL_KEY, JSON.stringify([...savedManual]));
      document.getElementById('stream-count').textContent =
        tf('monitoring.count', { n: streamStates.length });
    } catch (e) { /* silent */ }
    addBtn.textContent = t('modal.add');
    addBtn.disabled = false;
    closeModal();
  });
})();

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('lang-toggle').addEventListener('click', () => {
  setLang(_lang === 'bg' ? 'en' : 'bg');
});

function onLangChange() {
  if (SESSION_ID) {
    document.getElementById('session-label').textContent =
      t(_lastResumed ? 'session.resumed' : 'session.new') + ' ' + SESSION_ID.slice(0, 8) + ' · #' + USER_ID;
    document.getElementById('stream-count').textContent =
      tf('monitoring.count', { n: streamStates.length });
  }
  for (const state of streamStates) updateCard(state);
  // Sync language to detector iframe
  const frame = document.getElementById('inspect-frame');
  if (frame.contentWindow) frame.contentWindow.postMessage({ type: 'set-lang', lang: _lang }, '*');
}

applyTranslations();
init();
</script>
</body>
